# Config Nginx para servir o bundle React em produção.
# O React-Router usa HTML5 history: redireciona tudo pro index.html.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache agressivo dos assets hashados do Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML sem cache pra sempre pegar o mais novo após deploy
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Fallback pra SPA — roteamento client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compressão básica
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
